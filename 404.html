<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found | Zain Abusal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-logo">ZainAbusal</a>
    <nav class="topbar-nav">
      <a href="/about">about</a>
      <a href="/portfolio">portfolio</a>
      <a href="/contact">contact</a>
    </nav>
  </div>
</header>
<main class="wrapper" style="padding-top:60px;padding-bottom:60px;min-height:calc(100vh - 160px);">
  <section class="window" style="max-width:720px;margin:0 auto;">
    <div class="window-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      <span class="window-title">404 <span>.notfound</span></span>
    </div>
    <div class="window-body" style="padding:32px;">
      <h1 style="font-family:var(--sans);font-size:clamp(36px,6vw,56px);margin-bottom:18px;color:var(--text);">Page not found</h1>
      <p style="font-family:var(--mono);font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:28px;">
        The route you requested could not be found. If you typed a clean path like <strong>/about</strong>, it should work now on Vercel.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <a href="/" class="btn btn-primary">Home</a>
        <a href="/contact" class="btn btn-ghost">Contact</a>
        <a href="/portfolio" class="btn btn-ghost">Portfolio</a>
      </div>
    </div>
  </section>
</main>
<footer>
  <div class="footer-inner">
    <div class="footer-left"><span>// </span>Zain Abusal | ZCraft Studios | 2026</div>
    <div class="footer-links">
      <a href="https://studio.z-craft.xyz">studio.z-craft.xyz</a>
      <a href="/portfolio">plugins</a>
      <a href="https://github.com/zain-abusal">github</a>
    </div>
  </div>
</footer>
</body>
</html>
